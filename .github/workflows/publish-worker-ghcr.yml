name: Publish Worker to GHCR

on:
  push:
    branches: ['master']
    paths:
      - 'activities-examples/**'
      - '.github/workflows/publish-worker-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: write # create GitHub Releases
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/temporal-worker

jobs:
  publish:
    name: Build and Publish Worker (${{ matrix.version }})
    runs-on: ubuntu-latest

    # Build one image per worker version so the temporal-worker-controller can
    # roll between them (the version is passed via the WORKER_VERSION build arg;
    # the makeHTTPRequest activity stamps its answer with it). The `unversioned`
    # image is the same code run as a plain worker — it only opts into Worker
    # Versioning when the controller injects a deployment name + build id, so
    # without the controller it behaves as an ordinary unversioned worker.
    strategy:
      fail-fast: false
      matrix:
        version: [unversioned, v1, v2]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `:<version>` is a moving label; `:<version>-<sha>` is the immutable
          # tag the controller turns into a Build ID. v2 is also tagged `latest`.
          tags: |
            type=raw,value=${{ matrix.version }}
            type=sha,prefix=${{ matrix.version }}-,format=short
            type=raw,value=latest,enable=${{ matrix.version == 'v2' }}
          labels: |
            org.opencontainers.image.title=Temporal Worker (${{ matrix.version }})
            org.opencontainers.image.description=Temporal worker for activities examples (workflows ${{ matrix.version }})
            org.opencontainers.image.vendor=Sola Solutions
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./activities-examples
          file: ./activities-examples/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            WORKER_VERSION=${{ matrix.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=temporal-worker-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=temporal-worker-${{ matrix.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Create GitHub Release for ${{ matrix.version }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: worker-${{ matrix.version }}
          name: Temporal Worker ${{ matrix.version }}
          make_latest: ${{ matrix.version == 'v2' }}
          body: |
            Temporal worker image — workflows variant **${{ matrix.version }}**.

            ```
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}-${{ github.sha }}
            ```

            Digest: `${{ steps.build.outputs.digest }}`

            Roll between versions with the temporal-worker-controller by pointing
            the WorkerDeployment's image at the desired tag.
